name: Backend CI

on:
  push:
    branches: ['main']
    paths:
      - 'backend/**'
  pull_request:
    branches: ['main']
    paths:
      - 'backend/**'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile (lint gate)
        run: mvn -B -DskipTests compile

      - name: Run Unit Tests
        run: mvn -B -Dtest='*Test' test

  integration-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Integration Tests (H2)
        run: mvn -B -Dtest='*IT' test

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Test Docker Build (Verify Dockerfile)
        run: docker build -t smart-finance-backend:test .
