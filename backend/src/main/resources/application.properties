spring.application.name=SmartMoneyTracking

# Database Configuration (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/smart_money_tracking}
spring.datasource.username=${DB_USERNAME:smartuser}
spring.datasource.password=${DB_PASSWORD:smartpass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Naming Strategy (Optional - Uncomment after completing database cleanup)
# This automatically converts Java camelCase fields to database snake_case columns
# Prevents future column duplication issues
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000

# Server Configuration
server.port=8080

# Jackson Serialization
spring.jackson.time-zone=UTC
