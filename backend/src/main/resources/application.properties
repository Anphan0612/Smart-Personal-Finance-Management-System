spring.application.name=SmartMoneyTracking

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/smart_money_tracking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong1234567890
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000

# Server Configuration
server.port=8080

