name: smart-finance

services:
  db:
    image: mysql:8.0
    container_name: smart-finance-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - '${DB_PORT}:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./infrastructure/database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - smart-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-finance-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NLP_SERVICE_URL: http://ai-service:${AI_PORT}
    ports:
      - '8080:8080'
    networks:
      - smart-network
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8080/actuator/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1024M

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: smart-finance-ai
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      PHOBERT_MODEL_PATH: ${PHOBERT_MODEL_PATH}
      GROQ_TIMEOUT_SEC: ${GROQ_TIMEOUT_SEC}
      ENABLE_LLM_REPAIR: ${ENABLE_LLM_REPAIR}
      LLM_CONFIDENCE_THRESHOLD: ${LLM_CONFIDENCE_THRESHOLD}
    ports:
      - '${AI_PORT}:8000'
    volumes:
      - ai_model_cache:/app/models/cache
      - ai_uploads:/app/uploads
      - ./ml-models:/app/ml-models:ro
    networks:
      - smart-network
    healthcheck:
      test:
        [
          'CMD',
          'python3.10',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  smart-network:
    driver: bridge

volumes:
  db_data:
    name: smart_finance_db_data
  ai_model_cache:
    name: smart_finance_ai_cache
  ai_uploads:
    name: smart_finance_ai_uploads
